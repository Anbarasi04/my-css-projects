<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Playing Cards</title>
</head>
<body>
    <div class="container">
         <div class="cards-container">
            <div class="card">
                <div class="top">
                     <div>A</div>
                     <div>&spades;</div>
                </div>
                <div class="middle">
                    <div>&spades;</div>
                </div>
                <div class="bottom">
                    <div>A</div>   
                    <div>&spades;</div>     
                </div>
            </div>

            <div class="card-heart">
                <div class="top">
                     <div>A</div>
                     <div>&hearts;</div>
                </div>
                <div class="middle-heart">
                    <div>&hearts; &hearts;</div>
                    <div>&hearts; &hearts;</div>
                </div>
                <div class="bottom">
                    <div>A</div>   
                    <div>&hearts;</div>     
                </div>
            </div>
        </div>
    </div>
</body>
</html>
